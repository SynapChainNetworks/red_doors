<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Doors</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Special+Elite&display=swap');

  :root{
    --void:#0A0708;
    --blood:#7A0C0C;
    --blood-bright:#B3182B;
    --ember:#C97A2E;
    --bone:#E7DFC9;
    --ash:#8B8378;
    --line:#2B1414;
    --panel:#150C0D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at 50% -10%, #2A0A0A 0%, var(--void) 55%),
      var(--void);
    color:var(--bone);
    font-family:'Special Elite', 'Courier New', monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 2px),
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.6) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.7) 0%, transparent 45%);
    mix-blend-mode:multiply;
  }
  @keyframes flicker{
    0%,19%,21%,23%,80%,100%{opacity:1;}
    20%,22%,79%{opacity:.72;}
  }
  .stage{
    width:100%;
    max-width:640px;
    animation:flicker 6s infinite;
  }
  .card{
    background:linear-gradient(180deg, var(--panel), #0D0808);
    border:1px solid var(--line);
    border-radius:4px;
    padding:40px 34px;
    box-shadow:
      0 0 0 1px rgba(122,12,12,0.25),
      0 20px 60px rgba(0,0,0,0.8),
      inset 0 0 80px rgba(122,12,12,0.08);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:linear-gradient(90deg, transparent, var(--blood-bright), transparent);
  }
  .card::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(122,12,12,0.05) 1px, transparent 1px);
    background-size:100% 3px;
    opacity:.3;
  }
  h1{
    font-family:'Nosifer', 'Special Elite', serif;
    font-size:1.7rem;
    letter-spacing:.02em;
    margin:14px 0 10px;
    color:var(--blood-bright);
    text-shadow:0 0 12px rgba(179,24,43,0.55), 0 0 2px #000;
    line-height:1.3;
  }
  .eyebrow{
    font-family:'Special Elite', monospace;
    font-size:.72rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--ember);
    font-weight:700;
  }
  p{line-height:1.65; color:var(--ash);}
  p b{color:var(--bone);}
  .muted{color:#5c5450; font-size:.92rem;}
  .btn-row{display:flex; gap:12px; margin-top:28px; flex-wrap:wrap;}
  button{
    font-family:'Special Elite', monospace;
    font-size:.9rem;
    letter-spacing:.06em;
    font-weight:600;
    padding:13px 24px;
    border-radius:2px;
    border:1px solid var(--blood);
    cursor:pointer;
    transition:all .15s ease;
    text-transform:uppercase;
  }
  button:active{transform:translateY(2px);}
  .primary{background:var(--blood); color:var(--bone); box-shadow:0 0 16px rgba(179,24,43,0.35);}
  .primary:hover{background:var(--blood-bright); box-shadow:0 0 24px rgba(179,24,43,0.6);}
  .secondary{background:transparent; color:var(--ash); border-color:var(--line);}
  .secondary:hover{background:rgba(122,12,12,0.12); color:var(--bone);}
  .progress-track{
    display:flex; gap:6px; margin:20px 0 26px;
  }
  .dot{
    flex:1; height:5px; border-radius:2px; background:var(--line);
  }
  .dot.done{background:var(--blood-bright);}
  .dot.active{background:var(--ember); box-shadow:0 0 8px var(--ember);}
  .tag{
    display:inline-block;
    font-family:'Special Elite', monospace;
    font-size:.7rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    font-weight:700;
    padding:4px 12px;
    border-radius:2px;
    margin-bottom:14px;
    border:1px solid currentColor;
  }
  .tag.logika{color:#9B6FD1; background:rgba(155,111,209,0.08);}
  .tag.visual{color:#5FA3C9; background:rgba(95,163,201,0.08);}
  .tag.memori{color:var(--blood-bright); background:rgba(179,24,43,0.08);}
  .tag.angka{color:var(--ember); background:rgba(201,122,46,0.08);}
  .puzzle-body{margin:14px 0 20px;}
  .visual-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    margin:16px 0;
  }
  .visual-grid div{
    aspect-ratio:1;
    border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem;
    border:1px solid var(--line);
    background:#0D0708;
    color:var(--blood-bright);
  }
  .memory-card{
    display:inline-flex; align-items:center; justify-content:center;
    width:56px; height:56px;
    border-radius:4px;
    background:var(--blood);
    color:var(--bone);
    font-size:1.4rem;
    margin:4px;
    border:1px solid var(--blood-bright);
    box-shadow:0 0 10px rgba(179,24,43,0.4);
  }
  input[type=text]{
    font-family:'Courier New', monospace;
    font-size:1.3rem;
    letter-spacing:.15em;
    padding:12px 14px;
    width:180px;
    border-radius:2px;
    border:1px solid var(--blood);
    background:#0D0708;
    color:var(--bone);
    text-transform:uppercase;
  }
  input[type=text]:focus{outline:none; border-color:var(--blood-bright); box-shadow:0 0 10px rgba(179,24,43,0.4);}
  .hint{font-size:.85rem; color:#6b625d; margin-top:8px; font-style:italic;}
  .feedback{
    margin-top:14px; font-weight:600; font-family:'Special Elite', monospace; font-size:.88rem;
  }
  .feedback.ok{color:#7FA87F;}
  .feedback.no{color:var(--blood-bright);}
  .final-code{
    font-family:'Courier New', monospace;
    font-size:1.5rem;
    letter-spacing:.25em;
    background:#0D0708;
    border:1px solid var(--blood);
    border-radius:4px;
    padding:16px;
    text-align:center;
    margin:18px 0;
    color:var(--blood-bright);
    font-weight:700;
    text-shadow:0 0 10px rgba(179,24,43,0.5);
  }
  .consent-box{
    border:1px dashed var(--line);
    border-radius:4px;
    padding:16px;
    margin:18px 0;
    font-size:.9rem;
    background:rgba(122,12,12,0.05);
    color:var(--ash);
  }
  .door-icon{
    font-size:2.2rem;
    margin-bottom:6px;
    filter:drop-shadow(0 0 8px rgba(179,24,43,0.5));
  }
</style>
</head>
<body>
<div class="stage">
  <div class="card" id="app"></div>
</div>

const PUZZLES = {
  logika: {
    label: 'Logika',
    className: 'logika',
    question: 'Di balik pintu pertama, sebuah bisikan menghitung: 2, 4, 8, 16, ... Lanjutkan polanya (32), lalu tambahkan huruf T dan X di belakangnya.',
    prompt: 'Ketik jawabanmu (4 karakter, contoh format: 32TX)',
    answer: '32TX',
    hint: 'Pola: kalikan 2. Angka berikutnya adalah 32. Format jawaban: 32TX.'
  },
  visual: {
    label: 'Visual',
    className: 'visual',
    question: 'Sembilan bayangan berjejer di dinding. Satu di antaranya tidak seperti yang lain. Temukan posisinya (1-9), lalu tulis dengan format huruf V, S, lalu dua digit posisinya.',
    grid: ['●','●','●','●','▲','●','●','●','●'],
    prompt: 'Ketik jawabanmu (4 karakter, contoh format: VS05)',
    answer: 'VS05',
    hint: 'Bayangan berbeda ada di posisi ke-5. Format jawabannya: VS05.'
  },
  memori: {
    label: 'Memori',
    className: 'memori',
    sequence: ['🌙','⭐','🌙','🍀'],
    question: 'Empat lambang muncul sekilas di kegelapan. Ingat urutannya sebelum mereka menghilang.',
    prompt: 'Ketik huruf awal tiap simbol sesuai urutan (contoh format: M-B-M-D)',
    answer: 'BNBD',
    hint: 'Urutannya: Bulan, Bintang, Bulan, Daun → BNBD'
  },
  angka: {
    label: 'Angka',
    className: 'angka',
    question: 'Pintu terakhir hanya terbuka untuk yang bisa menjumlahkan: 6 + 7 + 2 + 6. Tambahkan huruf N dan A di depan hasilnya.',
    prompt: 'Ketik jawabanmu (4 karakter, contoh format: NA21)',
    answer: 'NA21',
    hint: 'Jumlahkan angkanya (21), lalu format jadi NA21.'
  }
};

function render(){
  const app = document.getElementById('app');
  if(state.screen === 'consent') return renderConsent(app);
  if(state.screen === 'intro') return renderIntro(app);
  if(ORDER.includes(state.screen)) return renderPuzzle(app, state.screen);
  if(state.screen === 'selesai') return renderDone(app);
}

function renderConsent(app){
  app.innerHTML = `
    <div class="door-icon">🚪</div>
    <span class="eyebrow">Sebelum melangkah masuk</span>
    <h1>RED DOORS</h1>
    <p>Empat pintu menunggu di balik kegelapan: <b>logika</b>, <b>visual</b>, <b>memori</b>, dan <b>angka</b>.
    Semua terjadi di halaman ini, di browser kamu. Tidak ada yang diinstal ke perangkat,
    tidak ada data yang dikirim ke mana pun, dan kamu bisa keluar kapan saja tanpa jejak apa pun tertinggal.</p>
    <div class="consent-box">
      Dengan menekan <b>"Masuk"</b>, kamu setuju untuk mencoba membuka 4 pintu ini.
      Kamu boleh menutup halaman ini kapan saja — tidak ada konsekuensi ke perangkatmu.
    </div>
    <div class="btn-row">
      <button class="primary" onclick="goto('intro')">Masuk</button>
      <button class="secondary" onclick="declineGame()">Tetap di luar</button>
    </div>
  `;
}

function declineGame(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <span class="eyebrow">Baik</span>
    <h1>Pintu tertutup kembali</h1>
    <p>Tidak apa-apa. Kamu bisa menutup halaman ini kapan saja. Tidak ada yang tersimpan atau berubah di perangkatmu.</p>
  `;
}

function renderIntro(app){
  app.innerHTML = `
    <span class="eyebrow">Cara main</span>
    <h1>Empat pintu, empat kunci</h1>
    <p>Setiap pintu punya kunci berupa <b>4 karakter</b> (gabungan angka dan huruf).
    Buka satu per satu. Di akhir, semua kuncimu akan menyatu jadi satu kode terakhir untukmu simpan sendiri
    (bukan dikirim ke mana pun).</p>
    <div class="btn-row">
      <button class="primary" onclick="goto('logika')">Buka pintu pertama</button>
    </div>
  `;
}

function renderPuzzle(app, key){
  const idx = ORDER.indexOf(key);
  const p = PUZZLES[key];
  let dots = ORDER.map((k,i)=>{
    let cls = 'dot';
    if(i < idx) cls += ' done';
    if(i === idx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let visualExtra = '';
  if(key === 'visual'){
    visualExtra = `<div class="visual-grid">${p.grid.map(s=>`<div>${s}</div>`).join('')}</div>`;
  }
  if(key === 'memori'){
    visualExtra = `<div style="margin:16px 0;">${p.sequence.map(s=>`<span class="memory-card">${s}</span>`).join('')}</div>`;
  }

  app.innerHTML = `
    <div class="progress-track">${dots}</div>
    <span class="tag ${p.className}">${p.label}</span>
    <h1 style="font-size:1.25rem;">${p.question}</h1>
    ${visualExtra}
    <div class="puzzle-body">
      <p class="muted">${p.prompt}</p>
      <input type="text" id="answerInput" maxlength="6" placeholder="____">
      <div class="feedback" id="feedback"></div>
      <p class="hint" id="hintText" style="display:none;">${p.hint}</p>
    </div>
    <div class="btn-row">
      <button class="primary" onclick="checkAnswer('${key}')">Coba kunci</button>
      <button class="secondary" onclick="showHint()">Butuh petunjuk</button>
    </div>
  `;
  document.getElementById('answerInput').focus();
  document.getElementById('answerInput').addEventListener('keydown', e=>{
    if(e.key === 'Enter') checkAnswer(key);
  });
}

function showHint(){
  document.getElementById('hintText').style.display = 'block';
}

function checkAnswer(key){
  const input = document.getElementById('answerInput');
  const val = input.value.trim().toUpperCase();
  const p = PUZZLES[key];
  const fb = document.getElementById('feedback');
  if(val === p.answer){
    state.answers[key] = val;
    fb.textContent = 'Pintu terbuka... melangkah ke ruang berikutnya.';
    fb.className = 'feedback ok';
    setTimeout(()=>{
      const idx = ORDER.indexOf(key);
      if(idx === ORDER.length - 1){
        goto('selesai');
      } else {
        goto(ORDER[idx+1]);
      }
    }, 700);
  } else {
    fb.textContent = 'Pintu tetap terkunci. Coba lagi atau minta petunjuk.';
    fb.className = 'feedback no';
  }
}

function renderDone(app){
  const code = ORDER.map(k=>state.answers[k]).join('-');
  app.innerHTML = `
    <div class="door-icon">🕯️</div>
    <span class="eyebrow">Selesai</span>
    <h1>Kamu telah melewati semua pintu</h1>
    <p>Ini kode terakhirmu, hasil gabungan dari 4 kunci tadi:</p>
    <div class="final-code">${code}</div>
    <p class="muted">Kode ini hanya ada di layar ini — tidak dikirim, tidak disimpan di mana pun, dan
    akan hilang begitu halaman ditutup. Simpan sendiri kalau mau menunjukkannya ke orang tua/gurumu.</p>
    <div class="consent-box">
      Ada suara hadiah menunggu di balik pintu terakhir. Tekan tombol di bawah untuk memutarnya (tidak akan
      diputar otomatis).
    </div>
    <audio id="rewardAudio" src="${REWARD_AUDIO_SRC}" preload="none"></audio>
    <div class="btn-row">
      <button class="primary" onclick="playReward()">🔊 Putar suara hadiah</button>
      <button class="secondary" onclick="goto('consent')">Masuk lagi dari awal</button>
    </div>
  `;
}

function playReward(){
  const audio = document.getElementById('rewardAudio');
  if(audio){
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  }
}

function goto(screen){
  state.screen = screen;
  render();
}

render();
</script>

</html>
